services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: telegram_shop_prompt3b1
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "15437:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d telegram_shop_prompt3b1"]
      interval: 2s
      timeout: 3s
      retries: 30
    volumes:
      - prompt3b1_pgdata:/var/lib/postgresql/data

volumes:
  prompt3b1_pgdata:
