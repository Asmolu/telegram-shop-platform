name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Python files
        working-directory: backend
        run: python -m compileall app tests

      - name: Ruff
        working-directory: backend
        run: ruff check .

      - name: Pytest
        working-directory: backend
        run: pytest

  frontend:
    name: Frontend builds
    runs-on: ubuntu-latest

    strategy:
      matrix:
        app: [mini-app, seller-panel]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ${{ matrix.app }}
        run: npm install

      - name: Build
        working-directory: ${{ matrix.app }}
        run: npm run build
